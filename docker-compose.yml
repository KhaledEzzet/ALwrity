services:
  alwrity-backend:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    restart: unless-stopped
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      HF_TOKEN: ${HF_TOKEN:-}
      GPT_PROVIDER: ${GPT_PROVIDER:-gemini}
      DATABASE_URL: ${DATABASE_URL:-sqlite:///./data/alwrity.db}
      SECRET_KEY: ${SECRET_KEY}
    volumes:
      - alwrity_backend_data:/app/backend/data
    expose:
      - "8000"

  alwrity-frontend:
    build:
      context: .
      dockerfile: ./frontend/Dockerfile
    restart: unless-stopped
    depends_on:
      - alwrity-backend
    environment:
      REACT_APP_API_URL: ${REACT_APP_API_URL}
      HOST: 0.0.0.0
      PORT: 3000
      DANGEROUSLY_DISABLE_HOST_CHECK: "true"
      WDS_SOCKET_PORT: 0
    expose:
      - "3000"

volumes:
  alwrity_backend_data: